# ─────────────────────────────────────────────────────────────────────────────
# Deploy KNetraHub static documentation to GitHub Pages
# ─────────────────────────────────────────────────────────────────────────────
#
# WHAT THIS DOES
#   Renders ONLY the in-app /documentation route to fully static HTML
#   (`pnpm run build:docs` → NUXT_STATIC_DOCS=true nuxt generate) and publishes
#   it to GitHub Pages. No Docker engine and no database are needed at build time
#   — placeholder secrets below satisfy Nuxt runtime-config validation only.
#
# WHEN IT RUNS
#   • Every push to `main` that touches the docs content or build config
#     (see the `paths:` filter below).
#   • Manually, any time, via the Actions tab → "Deploy Docs" → Run workflow
#     (workflow_dispatch).
#
# ONE-TIME SETUP (per repo / fork)
#   1. Repo → Settings → Pages
#   2. Build and deployment → Source: "GitHub Actions"
#   3. Push to main (or run this workflow manually) — done.
#
# PUBLISHED URL
#   https://<your-username>.github.io/<repo-name>/documentation
#   (for this repo: https://sengphirum.github.io/KNetraHub/documentation)
#
# BASE URL
#   NUXT_DOCS_BASE_URL is derived from the repo name so case-sensitive Pages
#   paths always match. If you use a custom domain or a user/org site
#   (username.github.io), set NUXT_DOCS_BASE_URL to "/" in the build step below.
#
# See the "Documentation & GitHub Actions" section of README.md for the
# human-readable overview.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      # Re-deploy whenever documentation content or the docs build config changes
      - 'app/pages/documentation.vue'
      - 'app/components/DocsSidebar.vue'
      - 'nuxt.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Allow one concurrent deployment; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────────────
  build:
    name: Build static docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      # Install all deps including better-sqlite3 native build
      # (ubuntu-latest ships Python 3, make, and g++ required by node-gyp)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generate static docs only (/documentation route)
      - name: Build static documentation
        run: pnpm run build:docs
        env:
          NUXT_STATIC_DOCS: 'true'
          # ── CHANGE THIS ───────────────────────────────────────────────────
          # Set to /  if you use a custom domain or username.github.io site
          # Set to /<repo-name>/  for a project site (github.io/<repo-name>)
          # Use repository.name so case-sensitive GitHub Pages paths always match.
          NUXT_DOCS_BASE_URL: '/${{ github.event.repository.name }}/'
          # ─────────────────────────────────────────────────────────────────
          # Dummy values so Nuxt runtime-config validation passes at build time
          NUXT_JWT_SECRET: 'docs-build-placeholder'
          NUXT_ADMIN_USERNAME: 'admin'
          NUXT_ADMIN_PASSWORD: 'placeholder'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  # ── 2. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
