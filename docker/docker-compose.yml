# Deploy KNetraHub itself as a swarm service.
#   ./service.sh build
#   ./service.sh push
#   docker stack deploy -c docker/docker-compose.yml knetrahub
# (or ./service.sh deploy to build locally + deploy in one step)
#
# It must be scheduled on a MANAGER node (placement constraint below) so it
# can reach the swarm control plane via the mounted Docker socket.
services:
  app:
    image: registry.kdsb.com.kh/knetrahub/app:latest
    ports:
      - "3000:3000"
    networks:
      - net
    environment:
      NUXT_JWT_SECRET: "change-me-to-a-long-random-string"
      NUXT_DOCKER_SOCKET_PATH: "/var/run/docker.sock"
      # Deployment environment mode (production|staging|development|testing).
      # Setting it here FIXES the mode - admins can't change it in the UI.
      # Unset = admin-configurable (Settings -> Appearance), else auto-detected
      # from the serving domain. Non-production modes stamp a Dev/Test/STG
      # corner tag on the app logo, favicon, and PWA icons.
      # NUXT_ENV_MODE: "staging"
      # Shared secret with the knetrahub-agent service below - keep them in
      # sync (or point both at the same Docker secret: this var also accepts
      # NUXT_AGENT_TOKEN_FILE, and the agent service accepts the equivalent
      # KNETRAHUB_AGENT_TOKEN_FILE - see that service's comment below).
      NUXT_AGENT_TOKEN: "change-me-to-a-long-random-string"
      # Main KNetraHub portal database. Module databases are created from the
      # Admin -> Modules wizard, either on this host or on separate hosts.
      # Keep portal credentials in sync with the timescaledb service below.
      #
      # Every NUXT_DB_* var here also accepts a "_FILE" sibling pointing at a
      # file whose contents become the value (docker/docker-entrypoint.sh
      # resolves it before the app starts) - the same convention the
      # timescaledb image below uses for POSTGRES_PASSWORD_FILE. Prefer this
      # over the plaintext lines below for NUXT_DB_PASSWORD in production, e.g.:
      #   secrets:
      #     - knetrahub_db_password
      #   environment:
      #     NUXT_DB_PASSWORD_FILE: "/run/secrets/knetrahub_db_password"
      # (create the secret once with `docker secret create knetrahub_db_password -`,
      # then reference the same secret name from the timescaledb service's
      # POSTGRES_PASSWORD_FILE below - no more manually keeping two plaintext
      # values in sync.)
      NUXT_DB_HOST: "timescaledb"
      NUXT_DB_PORT: "5432"
      NUXT_DB_NAME: "knetrahub"
      NUXT_DB_USER: "knetrahub"
      NUXT_DB_PASSWORD: "change-me-to-a-long-random-string"
      NUXT_DB_POOL_MAX: "20"
      NUXT_METRICS_RETENTION_DAYS: "30"
      # Local users are always enabled. Optional UI/session/password defaults:
      NUXT_LOCAL_AUTH_HIDE_LOGIN: "false"
      NUXT_LOCAL_AUTH_SESSION_TIMEOUT_MINUTES: "720"
      NUXT_LOCAL_AUTH_PASSWORD_MIN_LENGTH: "8"
      NUXT_LOCAL_AUTH_PASSWORD_REQUIRE_UPPERCASE: "false"
      NUXT_LOCAL_AUTH_PASSWORD_REQUIRE_LOWERCASE: "false"
      NUXT_LOCAL_AUTH_PASSWORD_REQUIRE_NUMBER: "false"
      NUXT_LOCAL_AUTH_PASSWORD_REQUIRE_SPECIAL: "false"
      # LDAP (optional)
      NUXT_LDAP_ENABLED: "false"
      # OIDC SSO (optional)
      NUXT_OIDC_ENABLED: "false"
      # NUXT_OIDC_ISSUER: "https://keycloak.example.com/realms/main"
      # NUXT_OIDC_CLIENT_ID: "knetrahub"
      # NUXT_OIDC_CLIENT_SECRET: "client-secret"
      # NUXT_OIDC_ADMIN_GROUP: "swarm-admins"
      # NUXT_OIDC_OPERATOR_GROUP: "swarm-operators"
      # GitLab (optional)
      # NUXT_GITLAB_URL: "https://gitlab.com"
      # NUXT_GITLAB_TOKEN: "glpat-xxxxx"
      # NUXT_GITLAB_PROJECT_ID: "12345678"
      # NUXT_GITLAB_BRANCH: "main"
      # NUXT_GITLAB_STACKS_PATH: "stacks"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Database backups (Admin > System > Maintenance) - persisted across
      # redeploys; the app writes to /app/data/backups by default
      # (override with NUXT_BACKUP_DIR).
      - app-backups:/app/data/backups
    deploy:
      mode: replicated
      replicas: 1             # >=2 for rolling, zero-downtime updates
      endpoint_mode: vip
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.2
        order: start-first     # key for zero-downtime
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        monitor: 30s
        max_failure_ratio: 0.2
        order: start-first
      restart_policy:
        condition: on-failure  # or "any" if you want auto-restart on unhealthy
        delay: 5s
        max_attempts: 3
        window: 30s
      # Baseline for a small/medium swarm (roughly up to ~10 nodes, ~150
      # containers). The dashboard and services/tasks lists fan out several
      # concurrent Docker Engine API calls + Postgres queries per request, so
      # give it enough CPU headroom to burst rather than queueing under the
      # event loop. Scale reservations up with cluster size (more nodes/
      # containers = more work per aggregation request).
      resources:
        reservations:
          cpus: '0.25'
          memory: 512M
        limits:
          cpus: '1.00'
          memory: 2048M
      placement:
        constraints:
          - node.role == manager

  # Reports live CPU/memory/disk usage for the node it runs on. Deployed
  # globally (one task per node, managers included) since knetrahub only has
  # direct Docker API access to its own node - this is how it learns the
  # usage of every other node without exposing the Docker API over TCP.
  agent:
    image: registry.kdsb.com.kh/knetrahub/agent:latest
    networks:
      - net
    environment:
      KNETRAHUB_AGENT_URL: "http://knetrahub_app:3000/api/agent/report"
      # Must match the app service's NUXT_AGENT_TOKEN above (different var
      # name, same value - the app validates incoming reports against it).
      # This image is distroless (no shell, see agent/Dockerfile), so _FILE
      # resolution happens in agent/fileEnv.mjs instead of a shell
      # entrypoint - functionally the same as the app's docker-entrypoint.sh.
      # Prefer this over the plaintext line below in production, e.g.:
      #   secrets:
      #     - knetrahub_agent_token
      #   environment:
      #     KNETRAHUB_AGENT_TOKEN_FILE: "/run/secrets/knetrahub_agent_token"
      # (reference the same secret name from the app service's
      # NUXT_AGENT_TOKEN_FILE above - one shared secret, not two plaintext
      # values to keep in sync.)
      KNETRAHUB_AGENT_TOKEN: "change-me-to-a-long-random-string"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      mode: global
      labels:
        knetrahub.agent: 'true'
      update_config:
        parallelism: 1
        delay: 5s
        failure_action: continue
        monitor: 20s
        max_failure_ratio: 0.2
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 30s
      resources:
        limits:
          cpus: '0.10'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M

  # Single Postgres + TimescaleDB instance: plain tables for app data
  # (users/settings/audit/...) and Timescale hypertables for node/container
  # metrics history (queried by the app's /api/*/metrics routes).
  timescaledb:
    image: registry.kdsb.com.kh/timescale/timescaledb:2.28.2-pg17
    networks:
      - net
    environment:
      POSTGRES_DB: knetrahub
      POSTGRES_USER: knetrahub
      # Keep in sync with the app service's NUXT_DB_PASSWORD above (or, better,
      # switch both services to the same Docker secret - see the app service's
      # NUXT_DB_PASSWORD_FILE comment above; this image already supports
      # POSTGRES_PASSWORD_FILE natively).
      POSTGRES_PASSWORD: "change-me-to-a-long-random-string"
    # Sized for the 4096M limit below (25% shared_buffers is the standard
    # rule of thumb). Without this, Postgres runs on the image's stock
    # defaults (~128MB shared_buffers) and leaves memory sizing entirely to
    # the OS page cache, which is harder to reason about under load and risks
    # a cgroup OOM kill on a burst instead of Postgres evicting buffers
    # gracefully. max_connections=120 covers the portal plus the default
    # Docker, Monitoring, and IPAM module pool ceilings on this shared host,
    # with headroom for admin/psql/backup connections; work_mem is sized so
    # max_connections concurrent
    # sorts/hashes can't exceed shared_buffers even in the worst case
    # (120 * 8MB = 960MB). Re-tune if module pools or the memory limit
    # changes. Applying this requires redeploying this service (a brief
    # restart) - it will not take effect on a running container.
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=3GB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "max_connections=120"
    volumes:
      - timescale-data:/var/lib/postgresql/data
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 30s
      # Every node's agent writes multiple per-container rows here on each
      # report cycle (node/disk/container/network metrics), and the
      # dashboard/services/tasks pages read it back continuously (the
      # services list polls /api/services/usage every 5s) - this is the
      # service most likely to bottleneck under load, so give it the most
      # headroom. Raise further for larger swarms or a shorter agent report
      # interval.
      resources:
        reservations:
          cpus: '0.5'
          memory: 1024M
        limits:
          cpus: '2.00'
          memory: 4096M

volumes:
  timescale-data:
  app-backups:

networks:
  net:
    driver: overlay
    attachable: true
