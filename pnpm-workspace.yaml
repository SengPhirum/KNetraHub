# pnpm 10+ reads these settings here (not from .npmrc). shamefullyHoist mirrors
# the legacy .npmrc `shamefully-hoist=true` so transitive deps like `tailwindcss`
# (a dependency of @nuxt/ui, imported by app/assets/css/main.css via the
# @tailwindcss/vite plugin) resolve from the project's top-level node_modules.
shamefullyHoist: true

allowBuilds:
  '@parcel/watcher': true
  cpu-features: true
  esbuild: true
  protobufjs: true
  ssh2: true
  vue-demi: true
